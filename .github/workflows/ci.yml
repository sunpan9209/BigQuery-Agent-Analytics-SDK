name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatting tools
        run: pip install "pyink>=24.3.0" "isort>=5.0"

      - name: Run autoformat and check for changes
        run: |
          bash autoformat.sh
          if ! git diff --exit-code src/ tests/ examples/; then
            echo ""
            echo "::error::Code is not formatted. Run 'bash autoformat.sh' and commit the changes."
            exit 1
          fi

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [format, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Package version: ${VERSION}"
          ls -la dist/
          ls dist/ | grep "${VERSION}" || (echo "Version mismatch in built artifacts" && exit 1)

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
