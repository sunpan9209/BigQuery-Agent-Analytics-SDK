const YAML_SPEC = `# YMGO (Yahoo Media Graph Ontology) V3 — Context Graph Specification
#
# This YAML defines the ontology for a configuration-driven context graph.
# Use {{ env }} placeholders for environment-specific table bindings,
# resolved at load time via load_graph_spec(path, env="project.dataset").

graph:
  name: YMGO_Context_Graph_V3

  # ── Entity Definitions ──────────────────────────────────
  entities:
    - name: mako_DecisionPoint
      description: "The atomic unit of decisioning where an agent evaluates alternatives."
      binding:
        source: "{{ env }}.decision_points"
      keys:
        primary: [decision_id]
      properties:
        - name: decision_id
          type: string
        - name: decision_type
          type: string

    - name: sup_YahooAdUnit
      extends: mako_Candidate       # label-only inheritance
      description: "A specific ad slot on a Yahoo property being evaluated as a candidate."
      binding:
        source: "{{ env }}.yahoo_ad_units"
      keys:
        primary: [adUnitId]
      properties:
        - name: adUnitId
          type: string
        - name: adUnitName
          type: string
        - name: adUnitSize
          type: string
          description: "e.g., '300x250', '728x90'"
        - name: adUnitPosition
          type: string
          description: "ATF (above the fold) | BTF (below the fold)"

    - name: mako_RejectionReason
      description: "Structured reason why a Candidate was not selected at a DecisionPoint."
      binding:
        source: "{{ env }}.rejection_reasons"
      keys:
        primary: [rejection_id]
      properties:
        - name: rejection_id
          type: string
        - name: rejectionType
          type: string
          description: "RULE_BASED | MODEL_BASED | TIMEOUT | ERROR"
        - name: rejectionRule
          type: string
          description: "The specific rule or model threshold that caused rejection."

  # ── Relationship Definitions ────────────────────────────
  relationships:
    - name: CandidateEdge
      description: "Connects a decision point to the evaluated Yahoo Ad Unit."
      from_entity: mako_DecisionPoint
      to_entity: sup_YahooAdUnit
      binding:
        source: "{{ env }}.candidate_edges"
        from_columns: [decision_id]
        to_columns: [adUnitId]
      properties:
        - name: edge_type
          type: string
          description: "SELECTED_CANDIDATE or DROPPED_CANDIDATE"
        - name: mako_scoreValue
          type: double
          description: "The confidence or predicted Q-value for this candidate."

    - name: ForCandidate
      description: "Maps the MAKO rejection rationale directly to the dropped candidate."
      from_entity: mako_RejectionReason
      to_entity: sup_YahooAdUnit
      binding:
        source: "{{ env }}.rejection_mappings"
        from_columns: [rejection_id]
        to_columns: [adUnitId]`;

const SQL_BLOCKS = {
  propertyGraphDDL: {
    name: 'Property Graph DDL',
    sql: `-- Property Graph DDL generated from ymgo_graph_spec.yaml
-- Node KEY includes session_id so same entity in different sessions
-- produces distinct graph nodes (multi-session safe).
CREATE OR REPLACE PROPERTY GRAPH \`proj.ds.YMGO_Context_Graph_V3\`
  NODE TABLES (
    \`proj.ds.decision_points\` AS mako_DecisionPoint
      KEY (decision_id, session_id)
      LABEL mako_DecisionPoint
      PROPERTIES (decision_type, extracted_at),

    \`proj.ds.yahoo_ad_units\` AS sup_YahooAdUnit
      KEY (adUnitId, session_id)
      LABEL sup_YahooAdUnit
      LABEL mako_Candidate
      PROPERTIES (adUnitName, adUnitSize, adUnitPosition, extracted_at),

    \`proj.ds.rejection_reasons\` AS mako_RejectionReason
      KEY (rejection_id, session_id)
      LABEL mako_RejectionReason
      PROPERTIES (rejectionType, rejectionRule, extracted_at)
  )
  EDGE TABLES (
    \`proj.ds.candidate_edges\` AS CandidateEdge
      KEY (decision_id, adUnitId, session_id)
      SOURCE KEY (decision_id, session_id)
        REFERENCES mako_DecisionPoint (decision_id, session_id)
      DESTINATION KEY (adUnitId, session_id)
        REFERENCES sup_YahooAdUnit (adUnitId, session_id)
      LABEL CandidateEdge
      PROPERTIES (edge_type, mako_scoreValue, extracted_at),

    \`proj.ds.rejection_mappings\` AS ForCandidate
      KEY (rejection_id, adUnitId, session_id)
      SOURCE KEY (rejection_id, session_id)
        REFERENCES mako_RejectionReason (rejection_id, session_id)
      DESTINATION KEY (adUnitId, session_id)
        REFERENCES sup_YahooAdUnit (adUnitId, session_id)
      LABEL ForCandidate
      PROPERTIES (extracted_at)
  )`,
  },
  aiGenerate: {
    name: 'AI.GENERATE Extraction',
    sql: `-- Extract entities from raw agent events using AI.GENERATE
-- The ontology spec binding.source drives the prompt template
SELECT
  base.session_id,
  JSON_EXTRACT_SCALAR(entity, '$.decision_id') AS decision_id,
  JSON_EXTRACT_SCALAR(entity, '$.decision_type') AS decision_type,
  JSON_EXTRACT_SCALAR(entity, '$.label') AS label
FROM \`proj.ds.agent_events\` AS base,
UNNEST(JSON_EXTRACT_ARRAY(
  AI.GENERATE(
    CONCAT(
      'Extract decision points from this ad-serving event payload.',
      '\\nEntity schema: {decision_id: STRING, decision_type: STRING, label: STRING}',
      '\\nPayload:\\n', TO_JSON_STRING(base.content)
    ),
    endpoint => 'https://aiplatform.googleapis.com/.../gemini-3-flash-preview',
    output_schema => '{"type":"ARRAY","items":{"type":"OBJECT","properties":{
      "decision_id":{"type":"STRING"},
      "decision_type":{"type":"STRING"},
      "label":{"type":"STRING"}
    }}}'
  ).result
)) AS entity
WHERE base.session_id IN UNNEST(@session_ids)`,
  },
  gqlShowcase: {
    name: 'GQL Showcase Query',
    sql: `-- GQL: Trace candidate decisions with rejection reasons
-- Generated by compile_showcase_gql(spec, "proj", "ds")
GRAPH \`proj.ds.ymgo_ad_decisioning\`
MATCH
  (dp:DecisionPoint)-[ce:CandidateEdge]->(au:YahooAdUnit),
  (rr:RejectionReason)-[fc:ForCandidate]->(au)
WHERE dp.session_id = @session_id
  AND ce.edgeType = 'DROPPED_CANDIDATE'
RETURN
  dp.decision_id,
  dp.label        AS decision_label,
  au.adUnitName,
  au.adUnitSize,
  ce.mako_scoreValue,
  rr.rejectionType,
  rr.rejectionRule
ORDER BY ce.mako_scoreValue DESC`,
  },
  insertPattern: {
    name: 'Table Materialization INSERT',
    sql: `-- Materialize extracted entities into node/edge tables
-- The SDK runs this as a parameterized query per entity type
INSERT INTO \`proj.ds.decision_points\`
  (session_id, decision_id, decision_type, label)
SELECT
  @session_id           AS session_id,
  extracted.decision_id AS decision_id,
  extracted.decision_type,
  extracted.label
FROM UNNEST(@extracted_decisions) AS extracted;

INSERT INTO \`proj.ds.candidate_edges\`
  (session_id, decision_id, adUnitId, edgeType, mako_scoreValue)
SELECT
  @session_id,
  ce.decision_id,
  ce.adUnitId,
  ce.edgeType,
  ce.mako_scoreValue
FROM UNNEST(@candidate_edges) AS ce;`,
  },
};

const OntologyGraphViz = ({ session }) => {
  const [selectedNode, setSelectedNode] = useState(null);
  if (!session) return null;

  const W = 900, H = 480;
  const dpNodes = session.decisionPoints.map((dp, i) => ({
    id: dp.decision_id, kind: 'decision', label: dp.label,
    data: dp, x: 160 + i * 300, y: 80,
  }));
  const auNodes = session.adUnits.map((au, i) => ({
    id: au.adUnitId, kind: 'adunit', label: au.adUnitName,
    data: au, x: 100 + i * 200, y: 260,
  }));
  const rrNodes = session.rejectionReasons.map((rr, i) => ({
    id: rr.rejection_id, kind: 'rejection', label: rr.rejectionType,
    data: rr, x: 160 + i * 300, y: 420,
  }));
  const allNodes = [...dpNodes, ...auNodes, ...rrNodes];
  const nodeMap = new Map(allNodes.map(n => [n.id, n]));

  return (
    <div>
      <svg width="100%" viewBox={`0 0 ${W} ${H + 20}`} style={{ background: C.grey[50], borderRadius: '8px' }}>
        <defs>
          <marker id="arrow-blue" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
            <path d="M0,0 L10,3 L0,6 Z" fill={C.blue[500]} />
          </marker>
          <marker id="arrow-red" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
            <path d="M0,0 L10,3 L0,6 Z" fill={C.red[500]} />
          </marker>
          <marker id="arrow-orange" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
            <path d="M0,0 L10,3 L0,6 Z" fill={C.orange[500]} />
          </marker>
        </defs>

        {/* Section labels */}
        <text x="16" y="30" fontSize="11" fill={C.grey[500]} fontWeight="500">DECISION POINTS</text>
        <text x="16" y="220" fontSize="11" fill={C.grey[500]} fontWeight="500">YAHOO AD UNITS</text>
        <text x="16" y="390" fontSize="11" fill={C.grey[500]} fontWeight="500">REJECTION REASONS</text>

        {/* CandidateEdge arrows */}
        {session.candidateEdges.map((ce, i) => {
          const from = nodeMap.get(ce.from), to = nodeMap.get(ce.to);
          if (!from || !to) return null;
          const sel = ce.edgeType === 'SELECTED_CANDIDATE';
          return <line key={`ce-${i}`} x1={from.x} y1={from.y + 24} x2={to.x} y2={to.y - 18}
            stroke={sel ? C.blue[500] : C.red[500]} strokeWidth={sel ? 2.5 : 1.5}
            strokeDasharray={sel ? 'none' : '6,4'} opacity={0.7}
            markerEnd={sel ? 'url(#arrow-blue)' : 'url(#arrow-red)'} />;
        })}

        {/* ForCandidate arrows */}
        {session.forCandidateEdges.map((fc, i) => {
          const from = nodeMap.get(fc.from), to = nodeMap.get(fc.to);
          if (!from || !to) return null;
          return <line key={`fc-${i}`} x1={from.x} y1={from.y - 18} x2={to.x} y2={to.y + 18}
            stroke={C.orange[500]} strokeWidth={1.5} strokeDasharray="4,3" opacity={0.6}
            markerEnd="url(#arrow-orange)" />;
        })}

        {/* Decision Point nodes (blue circles) */}
        {dpNodes.map(n => (
          <g key={n.id} transform={`translate(${n.x}, ${n.y})`} onClick={() => setSelectedNode(n)} style={{ cursor: 'pointer' }}>
            {selectedNode?.id === n.id && <circle r="28" fill="none" stroke={C.blue[500]} strokeWidth="3" />}
            <circle r="22" fill={C.blue[500]} stroke="white" strokeWidth="2" />
            <text textAnchor="middle" dy="4" fontSize="9" fill="white" fontWeight="500">DP</text>
            <text textAnchor="middle" dy="40" fontSize="10" fill={C.grey[700]}>{n.label}</text>
          </g>
        ))}

        {/* Yahoo Ad Unit nodes (green rectangles) */}
        {auNodes.map(n => (
          <g key={n.id} transform={`translate(${n.x}, ${n.y})`} onClick={() => setSelectedNode(n)} style={{ cursor: 'pointer' }}>
            {selectedNode?.id === n.id && <rect x="-72" y="-20" width="144" height="40" rx="6" fill="none" stroke={C.blue[500]} strokeWidth="3" />}
            <rect x="-68" y="-16" width="136" height="32" rx="4" fill={C.green[500]} stroke="white" strokeWidth="2" />
            <text textAnchor="middle" dy="3" fontSize="9" fill="white" fontWeight="500">{n.data.adUnitSize}</text>
            <text textAnchor="middle" dy="28" fontSize="9" fill={C.grey[600]}>{n.data.adUnitPosition}</text>
          </g>
        ))}

        {/* Rejection Reason nodes (red diamonds) */}
        {rrNodes.map(n => (
          <g key={n.id} transform={`translate(${n.x}, ${n.y})`} onClick={() => setSelectedNode(n)} style={{ cursor: 'pointer' }}>
            {selectedNode?.id === n.id && <polygon points="0,-24 24,0 0,24 -24,0" fill="none" stroke={C.blue[500]} strokeWidth="3" />}
            <polygon points="0,-18 18,0 0,18 -18,0" fill={C.red[500]} stroke="white" strokeWidth="2" />
            <text textAnchor="middle" dy="4" fontSize="7" fill="white" fontWeight="500">RR</text>
            <text textAnchor="middle" dy="32" fontSize="9" fill={C.grey[700]}>{n.label}</text>
          </g>
        ))}

        {/* Score labels on candidate edges */}
        {session.candidateEdges.map((ce, i) => {
          const from = nodeMap.get(ce.from), to = nodeMap.get(ce.to);
          if (!from || !to) return null;
          const mx = (from.x + to.x) / 2, my = (from.y + 24 + to.y - 18) / 2;
          return <text key={`lbl-${i}`} x={mx + 12} y={my} fontSize="9" fill={ce.edgeType === 'SELECTED_CANDIDATE' ? C.blue[600] : C.red[600]} fontWeight="500">{ce.mako_scoreValue.toFixed(2)}</text>;
        })}

        {/* Legend */}
        <g transform={`translate(16, ${H + 6})`}>
          <circle cx="6" cy="0" r="5" fill={C.blue[500]} /><text x="16" y="4" fontSize="9" fill={C.grey[500]}>Decision Point</text>
          <rect x="120" y="-6" width="12" height="12" rx="2" fill={C.green[500]} /><text x="138" y="4" fontSize="9" fill={C.grey[500]}>Ad Unit</text>
          <polygon points="210,0 218,-6 226,0 218,6" fill={C.red[500]} /><text x="232" y="4" fontSize="9" fill={C.grey[500]}>Rejection</text>
          <line x1="310" y1="0" x2="340" y2="0" stroke={C.blue[500]} strokeWidth="2" /><text x="346" y="4" fontSize="9" fill={C.grey[500]}>Selected</text>
          <line x1="400" y1="0" x2="430" y2="0" stroke={C.red[500]} strokeWidth="1.5" strokeDasharray="6,4" /><text x="436" y="4" fontSize="9" fill={C.grey[500]}>Dropped</text>
          <line x1="490" y1="0" x2="520" y2="0" stroke={C.orange[500]} strokeWidth="1.5" strokeDasharray="4,3" /><text x="526" y="4" fontSize="9" fill={C.grey[500]}>ForCandidate</text>
        </g>
      </svg>

      {selectedNode && (
        <Card style={{ marginTop: '12px', border: `2px solid ${C.blue[200]}` }} title={
          selectedNode.kind === 'decision' ? `DecisionPoint: ${selectedNode.label}` :
          selectedNode.kind === 'adunit' ? `YahooAdUnit: ${selectedNode.data.adUnitName}` :
          `RejectionReason: ${selectedNode.label}`
        }>
          <div style={{ fontSize: '12px' }}>
            {selectedNode.kind === 'decision' && (
              <div>
                <div><strong>decision_id:</strong> <code>{selectedNode.data.decision_id}</code></div>
                <div><strong>decision_type:</strong> {selectedNode.data.decision_type}</div>
                <div style={{ marginTop: '8px' }}><strong>Candidate edges:</strong></div>
                {session.candidateEdges.filter(e => e.from === selectedNode.id).map((e, i) => {
                  const au = session.adUnits.find(a => a.adUnitId === e.to);
                  return <div key={i} style={{ marginLeft: '12px', marginTop: '4px' }}>
                    <Badge color={e.edgeType === 'SELECTED_CANDIDATE' ? 'green' : 'red'}>{e.edgeType}</Badge>
                    {' '}{au?.adUnitName} (score: {e.mako_scoreValue.toFixed(2)})
                  </div>;
                })}
              </div>
            )}
            {selectedNode.kind === 'adunit' && (
              <div>
                <div><strong>adUnitId:</strong> <code>{selectedNode.data.adUnitId}</code></div>
                <div><strong>adUnitSize:</strong> {selectedNode.data.adUnitSize}</div>
                <div><strong>adUnitPosition:</strong> {selectedNode.data.adUnitPosition}</div>
              </div>
            )}
            {selectedNode.kind === 'rejection' && (
              <div>
                <div><strong>rejection_id:</strong> <code>{selectedNode.data.rejection_id}</code></div>
                <div><strong>rejectionType:</strong> <Badge color="red">{selectedNode.data.rejectionType}</Badge></div>
                <div><strong>rejectionRule:</strong> <code>{selectedNode.data.rejectionRule}</code></div>
              </div>
            )}
          </div>
        </Card>
      )}
    </div>
  );
};

// ============================================================
// YAML Spec Panel
// ============================================================

const YAMLSpecPanel = () => (
  <div style={{ display: 'grid', gap: '16px' }}>
    <Card title="YMGO Graph Spec" subtitle="Configuration-driven ontology definition (ymgo_graph_spec.yaml)">
      <CodeBlock code={YAML_SPEC} label="YAML Ontology Spec" maxHeight="520px" />
    </Card>
    <Card title="Spec Annotations" subtitle="Key configuration concepts">
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', fontSize: '12px' }}>
        <div style={{ padding: '12px', background: C.blue[50], borderRadius: '6px' }}>
          <strong style={{ color: C.blue[600] }}>binding.source</strong>
          <p style={{ color: C.grey[700], marginTop: '4px' }}>Maps an entity's properties to the raw source column. For example, <code>agent_events.content</code> tells AI.GENERATE which field to parse for extraction.</p>
        </div>
        <div style={{ padding: '12px', background: C.green[50], borderRadius: '6px' }}>
          <strong style={{ color: C.green[600] }}>keys (composite)</strong>
          <p style={{ color: C.grey[700], marginTop: '4px' }}>Composite keys like <code>[session_id, decision_id]</code> become the KEY clause in the Property Graph DDL, scoping nodes per session.</p>
        </div>
        <div style={{ padding: '12px', background: C.purple[50], borderRadius: '6px' }}>
          <strong style={{ color: C.purple[500] }}>extends</strong>
          <p style={{ color: C.grey[700], marginTop: '4px' }}>Inherits shared columns from a base entity definition. <code>extends: base_inventory_entity</code> pulls in common ad-inventory fields.</p>
        </div>
        <div style={{ padding: '12px', background: C.orange[50], borderRadius: '6px' }}>
          <strong style={{ color: C.orange[500] }}>relationships.labels</strong>
          <p style={{ color: C.grey[700], marginTop: '4px' }}>Edge label arrays like <code>[SELECTED_CANDIDATE, DROPPED_CANDIDATE]</code> enable GQL pattern matching by decision outcome.</p>
        </div>
      </div>
    </Card>
  </div>
);

// ============================================================
// Generated SQL Panel
// ============================================================

const GeneratedSQLPanel = () => {
  const [activeSQL, setActiveSQL] = useState('propertyGraphDDL');
  const block = SQL_BLOCKS[activeSQL];
  return (
    <div>
      <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
        {Object.entries(SQL_BLOCKS).map(([key, b]) => (
          <Badge key={key} color={activeSQL === key ? 'blue' : 'grey'} onClick={() => setActiveSQL(key)}>{b.name}</Badge>
        ))}
      </div>
      <SQLBlock sql={block.sql} maxHeight="500px" />
    </div>
  );
};

// ============================================================
// Python SDK Panel
// ============================================================

const PythonSDKPanel = () => (
  <Card title="Python SDK Usage" subtitle="bigquery_agent_analytics.ontology module + CLI">
    <CodeBlock code={SDK_CODE} label="Python SDK" maxHeight="560px" />
  </Card>
);

// ============================================================
// Main App
// ============================================================

function App() {
  const [activeTab, setActiveTab] = useState('graph');
  const [activeSession, setActiveSession] = useState(0);
  const session = YMGO_SESSIONS[activeSession];

  return (
    <div style={{ fontFamily: "'Google Sans', 'Roboto', sans-serif", background: C.grey[50], minHeight: '100vh' }}>
      {/* Header */}
      <header style={{ background: 'white', borderBottom: `1px solid ${C.grey[200]}`, padding: '12px 24px', display: 'flex', alignItems: 'center', gap: '16px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
          <div style={{ width: '40px', height: '40px', background: `linear-gradient(135deg, ${C.blue[500]}, ${C.green[500]})`, borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontWeight: 'bold', fontSize: '16px' }}>BQ</div>
          <div>
            <h1 style={{ margin: 0, fontSize: '18px', color: C.grey[900] }}>Ontology Graph V4 — Configuration-Driven Context Graph</h1>
            <p style={{ margin: 0, fontSize: '11px', color: C.grey[500] }}>YMGO Ad Decisioning Pipeline</p>
          </div>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
          <Badge color="blue">BigQuery Property Graph</Badge>
          <Badge color="purple">AI.GENERATE</Badge>
          <Badge color="green">GQL</Badge>
          <Badge color="orange">YAML Ontology</Badge>
        </div>
      </header>

      {/* Tabs */}
      <nav style={{ background: 'white', borderBottom: `1px solid ${C.grey[200]}`, paddingLeft: '24px', display: 'flex', overflow: 'auto' }}>
        <Tab active={activeTab === 'graph'} onClick={() => setActiveTab('graph')} icon="&#x1F578;">Ontology Graph</Tab>
        <Tab active={activeTab === 'yaml'} onClick={() => setActiveTab('yaml')} icon="&#x2699;">YAML Spec</Tab>
        <Tab active={activeTab === 'sql'} onClick={() => setActiveTab('sql')} icon="&#x1F5C3;">Generated SQL</Tab>
        <Tab active={activeTab === 'sdk'} onClick={() => setActiveTab('sdk')} icon="&#x1F40D;">Python SDK</Tab>
      </nav>

      <main style={{ padding: '24px', maxWidth: '1400px', margin: '0 auto' }}>
        {/* Session Selector */}
        <Card style={{ marginBottom: '20px', padding: '16px' }}>
          <div style={{ display: 'flex', gap: '12px', alignItems: 'center', flexWrap: 'wrap' }}>
            <span style={{ fontSize: '13px', fontWeight: 500, color: C.grey[700] }}>YMGO Session:</span>
            {YMGO_SESSIONS.map((s, i) => (
              <Button key={s.id} small primary={activeSession === i} onClick={() => setActiveSession(i)}>
                {s.campaign}
                {s.status === 'materialized' ? ' \u2713' : ' \u25CB'}
              </Button>
            ))}
          </div>
          <div style={{ display: 'flex', gap: '24px', fontSize: '12px', color: C.grey[500], marginTop: '12px' }}>
            <span>Session: <code style={{ background: C.grey[100], padding: '2px 6px', borderRadius: '3px' }}>{session.id}</code></span>
            <span>Decision Points: {session.decisionPoints.length}</span>
            <span>Ad Units: {session.adUnits.length}</span>
            <span>Rejections: {session.rejectionReasons.length}</span>
            <span>Status: <Badge color={session.status === 'materialized' ? 'green' : 'yellow'}>{session.status}</Badge></span>
          </div>
        </Card>

        {/* Tab Content */}
        {activeTab === 'graph' && (
          <div style={{ display: 'grid', gap: '20px' }}>
            <Card title="Ontology Graph Visualization" subtitle="DecisionPoint -> CandidateEdge -> YahooAdUnit | RejectionReason -> ForCandidate -> YahooAdUnit">
              <OntologyGraphViz session={session} />
            </Card>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '16px' }}>
              <Card title="Decision Points" subtitle={`${session.decisionPoints.length} auction decisions`}>
                {session.decisionPoints.map((dp, i) => (
                  <div key={i} style={{ padding: '8px 0', borderBottom: i < session.decisionPoints.length - 1 ? `1px solid ${C.grey[200]}` : 'none', fontSize: '12px' }}>
                    <Badge color="blue">{dp.decision_type}</Badge>
                    <div style={{ marginTop: '4px', color: C.grey[700] }}>{dp.label}</div>
                    <code style={{ fontSize: '10px', color: C.grey[500] }}>{dp.decision_id}</code>
                  </div>
                ))}
              </Card>
              <Card title="Ad Unit Candidates" subtitle={`${session.adUnits.length} Yahoo ad units`}>
                {session.adUnits.map((au, i) => {
                  const edge = session.candidateEdges.find(e => e.to === au.adUnitId);
                  return (
                    <div key={i} style={{ padding: '8px 0', borderBottom: i < session.adUnits.length - 1 ? `1px solid ${C.grey[200]}` : 'none', fontSize: '12px' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <span style={{ color: C.grey[700] }}>{au.adUnitName}</span>
                        {edge && <Badge color={edge.edgeType === 'SELECTED_CANDIDATE' ? 'green' : 'red'}>{edge.edgeType === 'SELECTED_CANDIDATE' ? 'SELECTED' : 'DROPPED'}</Badge>}
                      </div>
                      <div style={{ display: 'flex', gap: '8px', marginTop: '4px' }}>
                        <Badge color="grey">{au.adUnitSize}</Badge>
                        <Badge color="grey">{au.adUnitPosition}</Badge>
                        {edge && <span style={{ fontSize: '11px', color: C.grey[500] }}>score: {edge.mako_scoreValue.toFixed(2)}</span>}
                      </div>
                    </div>
                  );
                })}
              </Card>
              <Card title="Rejection Reasons" subtitle={`${session.rejectionReasons.length} drop reasons`}>
                {session.rejectionReasons.map((rr, i) => {
                  const fc = session.forCandidateEdges.find(e => e.from === rr.rejection_id);
                  const au = fc ? session.adUnits.find(a => a.adUnitId === fc.to) : null;
                  return (
                    <div key={i} style={{ padding: '8px 0', borderBottom: i < session.rejectionReasons.length - 1 ? `1px solid ${C.grey[200]}` : 'none', fontSize: '12px' }}>
                      <Badge color="red">{rr.rejectionType}</Badge>
                      <div style={{ marginTop: '4px', color: C.grey[700] }}><code style={{ fontSize: '10px' }}>{rr.rejectionRule}</code></div>
                      {au && <div style={{ marginTop: '4px', fontSize: '11px', color: C.grey[500] }}>Applied to: {au.adUnitName}</div>}
                    </div>
                  );
                })}
              </Card>
            </div>
          </div>
        )}

        {activeTab === 'yaml' && <YAMLSpecPanel />}
        {activeTab === 'sql' && <GeneratedSQLPanel />}
        {activeTab === 'sdk' && <PythonSDKPanel />}
      </main>

      {/* Footer */}
      <footer style={{ padding: '16px 24px', borderTop: `1px solid ${C.grey[200]}`, background: 'white' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', maxWidth: '1400px', margin: '0 auto', fontSize: '12px', color: C.grey[500] }}>
          <span>BigQuery Agent Analytics SDK — Ontology Graph V4</span>
          <div style={{ display: 'flex', gap: '24px' }}>
            <span>Entities extracted: <strong style={{ color: C.grey[700] }}>{session.stats.entities}</strong></span>
            <span>Edges materialized: <strong style={{ color: C.grey[700] }}>{session.stats.edges}</strong></span>
            <span>Property graph: <Badge color={session.stats.graphStatus === 'ACTIVE' ? 'green' : 'yellow'}>{session.stats.graphStatus}</Badge></span>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
